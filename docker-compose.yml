version: '3.9'

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/crisisiq
      - REDIS_URL=redis://redis:6379
      - AI_ENGINE_URL=http://ai-engine:8000
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-engine:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    env_file: .env
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  mongo_data:
