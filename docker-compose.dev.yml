version: '3.9'
services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env.development
    environment:
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-secret}@mongodb:27017/crisisiq?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-secret}@redis:6379
      - AI_ENGINE_URL=http://ai-engine:8000
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - .env.development
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret}
volumes:
  mongo_data:
