apiVersion: apps/v1
kind: Deployment
metadata:
  name: crisisiq-backend
  namespace: crisisiq
spec:
  replicas: 3
  selector:
    matchLabels:
      app: crisisiq-backend
  template:
    metadata:
      labels:
        app: crisisiq-backend
    spec:
      containers:
      - name: backend
        image: crisisiq/backend:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: crisisiq-secrets
              key: mongodb-uri
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: crisisiq-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: crisisiq-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: crisisiq-backend
  namespace: crisisiq
spec:
  selector:
    app: crisisiq-backend
  ports:
  - port: 80
    targetPort: 3001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crisisiq-backend-hpa
  namespace: crisisiq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crisisiq-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
