apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    alerting:
      alertmanagers:
      - static_configs:
        - targets:
          - alertmanager:9093
    rule_files:
      - /etc/prometheus/rules/*.yml
    scrape_configs:
      - job_name: 'crisisiq-backend'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
            - crisisiq
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app]
          regex: crisisiq-backend
          action: keep
        - source_labels: [__meta_kubernetes_pod_container_port_number]
          regex: "3001"
          action: keep
      - job_name: 'crisisiq-ai-engine'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
            - crisisiq
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app]
          regex: crisisiq-ai-engine
          action: keep
