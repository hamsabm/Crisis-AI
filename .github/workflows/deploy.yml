name: Deploy CrisisIQ
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hamsabm/crisis-ai

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install backend dependencies
      working-directory: ./backend
      run: npm install
    
    - name: Run backend tests
      working-directory: ./backend
      run: npm test --passWithNoTests
      env:
        MONGODB_URI: mongodb://localhost:27017/test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-secret
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install AI engine dependencies
      working-directory: ./ai-engine
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
    
    - name: Run AI engine tests
      working-directory: ./ai-engine
      run: pytest tests/ --override-ini="addopts=" || true
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
        COHERE_API_KEY: ${{ secrets.COHERE_API_KEY || '' }}
        HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY || '' }}
        GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY || '' }}
        OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY || '' }}
        USE_MOCK_LLM: 'true'

  validate-compose:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup temporary .env for validation
      run: |
        touch .env

    - name: Validate docker-compose syntax
      run: docker-compose config

  build-and-push:
    needs: [test, validate-compose]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [backend, frontend, ai-engine]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.service }}
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1
    
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name crisisiq-cluster --region ap-south-1
    
    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/crisisiq-backend \
          backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }} \
          -n crisisiq || true
        kubectl set image deployment/crisisiq-frontend \
          frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }} \
          -n crisisiq || true
        kubectl set image deployment/crisisiq-ai-engine \
          ai-engine=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ai-engine:${{ github.sha }} \
          -n crisisiq || true
